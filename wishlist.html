<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PetCart - Wishlist</title>
  <meta name="title" content="PetCart - Wishlist">
  <meta name="description" content="Wishlist — PetCart">

  <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./assets/css/style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bangers&family=Carter+One&family=Nunito+Sans:wght@400;700&display=swap"
    rel="stylesheet">
</head>

<body id="top" class="shop-body">
  <header class="header header-inner" data-header>
    <div class="container">
      <button class="nav-toggle-btn" aria-label="toggle manu" data-nav-toggler>
        <ion-icon name="menu-outline" aria-hidden="true" class="menu-icon"></ion-icon>
        <ion-icon name="close-outline" aria-label="true" class="close-icon"></ion-icon>
      </button>

      <a href="./index.html" class="logo">PetCart</a>

      <nav class="navbar" data-navbar>
        <ul class="navbar-list">
          <li class="navbar-item">
            <a href="./shop.html" class="navbar-link" data-nav-link>Shop</a>
          </li>
          <li class="navbar-item">
            <a href="./about.html" class="navbar-link" data-nav-link>About Us</a>
          </li>
          <li class="navbar-item">
            <a href="./contact.html" class="navbar-link" data-nav-link>Contact Us</a>
          </li>
        </ul>

        <a href="./login.html" class="navbar-action-btn">Log In</a>
      </nav>

      <div class="header-actions">
        <button class="action-btn" aria-label="Search">
          <ion-icon name="search-outline" aria-hidden="true"></ion-icon>
        </button>

        <div class="profile-dropdown-wrapper">
          <button class="action-btn user" type="button" aria-label="User" aria-haspopup="true" aria-expanded="false"
            data-profile-trigger>
            <ion-icon name="person-outline" aria-hidden="true"></ion-icon>
          </button>

          <div class="profile-dropdown" role="menu" aria-hidden="true" data-profile-dropdown>
            <a href="./login.html" role="menuitem" data-profile-link data-profile-login>Log In</a>
            <a href="./wishlist.html" role="menuitem" data-profile-link data-profile-wishlist>Wishlist</a>
          </div>
        </div>

        <button class="action-btn" type="button" aria-label="Open shopping cart" data-cart-open>
          <ion-icon name="bag-handle-outline" aria-hidden="true"></ion-icon>
          <span class="btn-badge" data-cart-badge>0</span>
        </button>
      </div>
    </div>
  </header>

  <main class="shop-main">
    <article>
      <section class="section static-page" aria-label="Wishlist">
        <div class="container">
          <div class="static-page-top">
            <nav class="checkout-page-breadcrumb" aria-label="Breadcrumb">
              <ol class="checkout-breadcrumb-list">
                <li>
                  <a href="./index.html">Home</a>
                </li>
                <li class="checkout-breadcrumb-sep" aria-hidden="true">/</li>
                <li>
                  <span aria-current="page">Wishlist</span>
                </li>
              </ol>
            </nav>
          </div>

          <h1 class="h2 section-title">
            <span class="span">Your —</span> Wishlist
          </h1>

          <p class="static-page-lead">
            Your wishlist is empty. Add items from the shop to see them here.
          </p>

          <a href="./shop.html" class="btn">
            Browse shop
          </a>
        </div>
      </section>
    </article>
  </main>

  <a href="#top" class="back-top-btn" aria-label="back to top" data-back-top-btn>
    <ion-icon name="chevron-up" aria-hidden="true"></ion-icon>
  </a>

  <div class="cart-overlay" data-cart-overlay aria-hidden="true"></div>

  <aside class="cart-panel" id="cart-panel" data-cart-panel aria-hidden="true" aria-labelledby="cart-panel-title">
    <div class="cart-panel-head">
      <h2 id="cart-panel-title" class="cart-panel-title">Your cart</h2>
      <button type="button" class="cart-panel-close" data-cart-close aria-label="Close cart">
        <ion-icon name="close-outline" aria-hidden="true"></ion-icon>
      </button>
    </div>
    <div class="cart-panel-body">
      <div data-cart-list></div>
    </div>
    <div class="cart-panel-foot">
      <div data-cart-totals></div>
      <div class="cart-panel-actions">
        <a href="./checkout.html" class="btn cart-checkout-btn" data-cart-checkout>Checkout</a>
        <button type="button" class="cart-continue-btn" data-cart-close>Continue shopping</button>
      </div>
    </div>
  </aside>

  <script src="./assets/js/script.js" defer></script>
  <script src="./assets/js/cart.js" defer></script>

  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>

</html>
